[build]
builder = "nixpacks"
nixpacksConfigPath = "nixpacks.toml"
buildCommand = "pnpm install --no-frozen-lockfile && BASE_PATH=/ NODE_ENV=production pnpm run build"

[deploy]
startCommand = "NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/healthz"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
