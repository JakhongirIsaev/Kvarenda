kind = "web"
previewPath = "/"
title = "Kvarenda"
version = "1.0.0"
id = "artifacts/kvarenda"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22970

[services.development]
run = "pnpm --filter @workspace/kvarenda run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kvarenda", "run", "build" ]
publicDir = "artifacts/kvarenda/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22970"
BASE_PATH = "/"
